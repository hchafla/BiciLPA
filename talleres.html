<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiciLPA · Talleres y tiendas</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f8f9fa; color: #333; line-height: 1.6; }

        /* Navegación superior común */
        nav { background: #2c3e50; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        nav a { color: #bdc3c7; text-decoration: none; margin-left: 20px; font-weight: 500; }
        nav a:hover, nav a.active { color: #fff; border-bottom: 2px solid #2ecc71; }
        .logo { font-weight: bold; font-size: 1.2rem; color: #fff; text-decoration: none; }

        /* Contenedor de Contenido */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: #2c3e50; font-size: 2rem; margin-bottom: 10px; }
        header p { color: #7f8c8d; font-size: 1.1rem; }

        /* Barra de Filtros */
        .filter-bar { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .filter-btn { background: white; border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .filter-btn:hover { border-color: #3498db; color: #3498db; }
        .filter-btn.active { background: #3498db; color: white; border-color: #3498db; }

        /* Sección de Mapa */
        .map-section { position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.06); border: 1px solid #e2e8f0; margin-bottom: 35px; }
        #map-talleres { width: 100%; height: 420px; z-index: 1; }

        .map-legend { position: absolute; bottom: 12px; left: 12px; z-index: 500; background: rgba(255,255,255,0.95); padding: 8px 14px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); display: flex; gap: 16px; font-size: 0.8rem; font-weight: 600; color: #334155; }
        .map-legend span { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); }
        .legend-dot.bici { background: #3498db; }
        .legend-dot.vmp { background: #9b59b6; }
        .legend-dot.ambos { background: linear-gradient(135deg, #3498db 50%, #9b59b6 50%); }

        /* Marcadores personalizados (sin numeración: solo color + icono por categoría) */
        .marker-taller { width: 30px; height: 30px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); border: 2px solid #fff; }
        .marker-taller span { transform: rotate(45deg); font-size: 0.85rem; line-height: 1; }
        .marker-taller.bici { background: #3498db; }
        .marker-taller.vmp { background: #9b59b6; }
        .marker-taller.ambos { background: linear-gradient(135deg, #3498db 50%, #9b59b6 50%); }

        .leaflet-popup-content { margin: 0; width: 260px !important; }
