<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BiciLPA · Rutas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-light: #f8f9fa;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e2e8f0;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* position:fixed + inset:0 bloquea por completo el scroll/rebote de la
           página en móvil. Sin esto, al llegar al final de un contenedor con
           scroll interno, el navegador "cede" el gesto a la página entera y
           arrastra consigo el mapa y la navbar. */
        html, body {
            height: 100%;
            width: 100%;
            position: fixed;
            inset: 0;
            overflow: hidden;
            overscroll-behavior: none;
            background-color: var(--bg-light);
        }
        body {
            display: flex;
            flex-direction: column;
        }
        /* Navegación superior (recuperada) */
        nav {
            background: #2c3e50;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 2000;
        }
        nav a { color: #bdc3c7; text-decoration: none; margin-left: 20px; font-weight: 500; font-size: 0.95rem; }
        nav a:hover, nav a.active { color: #fff; border-bottom: 2px solid #2ecc71; }
        .logo { font-weight: bold; font-size: 1.2rem; color: #fff; text-decoration: none; }
        /* Contenedor Principal: ocupa el espacio restante bajo la navbar,
           en vez de un 100vh/100vw fijo que ignoraba la navbar */
        .map-container {
            position: relative;
            width: 100%;
            flex: 1;
            min-height: 0; /* imprescindible para que flex:1 se calcule bien */
        }
        #map-rutas {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* HEADER / SELECTOR DE EJES (Flotante) */
        .selector-ejes {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 90%;
            overflow-x: auto;
            scrollbar-width: none; /* Firefox */
        }
        .selector-ejes::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }
        .eje-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dark);
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }
        .eje-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }
        .eje-btn.active {
            color: #fff;
        }
        /* Colores específicos de los botones de ejes */
        .eje-btn[data-eje="este"].active { background-color: #0074D9; }
        .eje-btn[data-eje="norte"].active { background-color: #2ECC40; }
        .eje-btn[data-eje="baja-alta"].active { background-color: #FF851B; }
        .eje-btn[data-eje="alta-baja"].active { background-color: #B10DC9; }
        /* CARRUSEL HORIZONTAL DE RUTAS (SUBMENÚ) */
        .rutas-carrusel {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: none; /* Cambia a flex vía JavaScript */
            gap: 10px;
            max-width: 90%;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: none;
        }
        .rutas-carrusel::-webkit-scrollbar {
            display: none;
        }
        .carrusel-item {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: var(--shadow);
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .carrusel-item:hover {
            transform: translateY(-2px);
        }
        /* Color de los ítems seleccionados según su eje */
        .carrusel-item.active[data-eje-grupo="este"] { background: #0074D9; color: white; border-color: #0074D9; }
        .carrusel-item.active[data-eje-grupo="norte"] { background: #2ECC40; color: white; border-color: #2ECC40; }
        .carrusel-item.active[data-eje-grupo="baja-alta"] { background: #FF851B; color: white; border-color: #FF851B; }
        .carrusel-item.active[data-eje-grupo="alta-baja"] { background: #B10DC9; color: white; border-color: #B10DC9; }
        /* BARRA LATERAL (SIDEBAR / BOTTOM SHEET) */
        .rutas-sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 380px;
            max-height: calc(100vh - 40px);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: var(--shadow);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateX(120%); /* Oculto por defecto en escritorio */
            transition: transform 0.4s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            border: 1px solid var(--border-color);
        }
        .rutas-sidebar.visible {
            transform: translateX(0);
        }
        /* Handle para arrastre en móvil */
        .drag-handle {
            display: none;
            width: 40px;
            height: 5px;
            background: #cbd5e1;
            border-radius: 3px;
            margin: 10px auto 5px auto;
            cursor: grab;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 15px 20px 10px 20px;
            display: flex;
            justify-content: flex-end;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            transition: var(--transition);
        }
        .close-btn:hover {
            color: var(--text-dark);
        }
        .sidebar-content {
            flex: 1;
            min-height: 0; /* clave: sin esto, un hijo flex no se contrae y el overflow no scrollea entero */
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain; /* evita que el scroll "se escape" hacia la página/mapa */
        }
        /* Tarjeta de Información */
        .ruta-card {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .ruta-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.2;
            cursor: pointer;
        }
        .ruta-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: -5px;
        }
        .ruta-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
        }
        .ruta-meta span {
            background: var(--bg-light);
            padding: 6px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tag-dificultad {
            color: white !important;
        }
        .tag-dificultad.facil { background-color: #2ecc71 !important; }
        .tag-dificultad.moderado { background-color: #f39c12 !important; }
        .tag-dificultad.dificil { background-color: #e74c3c !important; }
        .descripcion-ruta {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #4a5568;
        }
        .indicaciones {
            background: #f7fafc;
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            border-radius: 0 12px 12px 0;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #4a5568;
        }
        /* Color dinámico del borde de indicaciones según eje */
        .ruta-card[data-eje="este"] .indicaciones { border-left-color: #0074D9; }
        .ruta-card[data-eje="norte"] .indicaciones { border-left-color: #2ECC40; }
        .ruta-card[data-eje="baja-alta"] .indicaciones { border-left-color: #FF851B; }
        .ruta-card[data-eje="alta-baja"] .indicaciones { border-left-color: #B10DC9; }
        /* PUNTO 1: Marcadores personalizados con icono desde el GeoJSON */
        .marcador-punto-icono-interior {
            width: 34px;
            height: 34px;
            background: #fff;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: var(--shadow);
        }
        /* RESPONSIVE (Móvil / Bottom Sheet) */
        @media (max-width: 768px) {
            .selector-ejes {
                top: 10px;
                padding: 6px;
                position: relative; /* necesario para el degradado del punto 4 */
            }
            .eje-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .rutas-carrusel {
                top: 70px;
            }
            .rutas-sidebar {
                top: auto;
                right: 0;
                bottom: 0;
                width: 100%;
                height: 85%;
                max-height: 85vh;
                border-radius: 24px 24px 0 0;
                transform: translateY(100%); /* Oculto abajo */
                box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.15);
                border: none;
                border-top: 1px solid var(--border-color);
            }
            .rutas-sidebar.visible {
                transform: translateY(55%); /* Elevado a la mitad por defecto */
            }
            .rutas-sidebar.expanded {
                transform: translateY(0%) !important;
            }
            .rutas-sidebar.minimized {
                transform: translateY(calc(100% - 75px)) !important;
            }
            .drag-handle {
                display: block;
            }
            .sidebar-header {
                padding: 5px 20px;
                justify-content: space-between;
                align-items: center;
                border-bottom: none;
            }
            .sidebar-content {
                padding: 10px 20px 30px 20px;
            }
            /* PUNTO 4: pista visual de scroll horizontal en el selector de ejes.
               Un degradado blanco sobre fondo blanco apenas se nota, así que aquí
               se combina con una flecha animada para que sea inequívoco. */
            .selector-ejes::after {
                content: '›';
                position: absolute;
                top: 0;
                right: 0;
                width: 46px;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: flex-end;
                padding-right: 8px;
                font-size: 1.4rem;
                font-weight: 800;
                color: var(--accent-color);
                background: linear-gradient(to right, rgba(248,249,250,0), rgba(248,249,250,0.9) 55%, rgba(248,249,250,0.98) 80%);
                border-radius: 0 30px 30px 0;
                pointer-events: none;
                transition: opacity 0.25s ease;
                animation: pistaScrollPulso 1.3s ease-in-out infinite;
            }
            .selector-ejes.scroll-fin::after {
                opacity: 0;
                animation: none;
            }
            @keyframes pistaScrollPulso {
                0%, 100% { transform: translateX(0); opacity: 1; }
                50% { transform: translateX(5px); opacity: 0.5; }
            }
        }
    </style>
</head>
<body>
    <!-- Menú de Navegación del Modelo Multi-página (recuperado) -->
    <nav>
        <a href="index.html" class="logo">🚲 BiciLPA</a>
        <div>
            <a href="index.html">Mapa en Vivo</a>
            <a href="rutas.html" class="active">Rutas Recomendadas</a>
            <a href="normativa.html">Normativa</a>
            <a href="talleres.html">Talleres</a>
        </div>
    </nav>
    <div class="map-container">
        <!-- Selector Principal de Ejes -->
        <div class="selector-ejes" id="selector-ejes">
            <button class="eje-btn" data-eje="este" onclick="filtrarEje('este')">Eje Este</button>
            <button class="eje-btn" data-eje="norte" onclick="filtrarEje('norte')">Eje Norte</button>
            <button class="eje-btn" data-eje="baja-alta" onclick="filtrarEje('baja-alta')">Conexión Baja-Alta</button>
            <button class="eje-btn" data-eje="alta-baja" onclick="filtrarEje('alta-baja')">Conexión Alta-Baja</button>
        </div>
        <!-- Submenú Horizontal de Rutas dependiente del Eje -->
        <div class="rutas-carrusel" id="rutas-carrusel"></div>
        <!-- El Mapa -->
        <div id="map-rutas"></div>
        <!-- Barra Lateral Dinámica -->
        <div class="rutas-sidebar" id="rutas-sidebar">
            <div class="drag-handle" id="drag-handle"></div>
            <div class="sidebar-header">
                <button class="close-btn" onclick="cerrarSidebar()">✕</button>
            </div>
            <div class="sidebar-content" id="contenedor-tarjetas">
                <!-- Se inyecta dinámicamente con JS -->
            </div>
        </div>
    </div>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Manifiesto Global (Cargado en orden prioritario) -->
    <script src="datos/manifest.js"></script>
    <!-- Script Principal de Control -->
    <script>
        // =========================================================================
        // INICIALIZACIÓN Y EVENTOS
        // =========================================================================
        // Inicialización del Mapa centrado en la zona de interés
        const map = L.map('map-rutas').setView([28.128, -15.432], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // Capa única donde viven TODAS las rutas precargadas del eje activo,
        // tanto las difuminadas como la seleccionada (a color pleno).
        let capasPreview = L.layerGroup().addTo(map);

        // Caché de datos ya descargados: idRuta -> datos completos del fichero
        // datos/rutas/{idRuta}.js. Evita volver a pedir el mismo fichero por red
        // y evita colisiones, ya que esos ficheros comparten la variable global
        // window.rutaActivaDatos (solo válida durante el instante de carga).
        let rutasCache = {};
        // Referencia a la instancia de capa Leaflet dibujada para cada ruta,
        // para poder localizar sus bounds o quitarla del mapa al redibujarla.
        let capasRutas = {};

        let ejeActual = null;
        let idRutaSeleccionada = null;

        const coloresEjes = {
            'este': '#0074D9',   
            'norte': '#2ECC40',     
            'baja-alta': '#FF851B', 
            'alta-baja': '#B10DC9'  
        };
        // Escucha segura para que se lea manifest.js antes de arrancar
        window.addEventListener("load", () => {
            if (typeof rutasManifest !== 'undefined') {
                // 1) Se precarga y dibuja TODA la red (todos los ejes) difuminada de una vez.
                // 2) En paralelo, se muestra el submenú del eje por defecto.
                precargarTodaLaRed();
                filtrarEje('este'); // Eje este por defecto para el submenú/carrusel
            } else {
                console.error("Error crítico: 'rutasManifest' no está definido. Revisa que el archivo datos/manifest.js exista y esté bien escrito.");
            }
        });

        // 1. PRECARGA DE TODA LA RED DE RUTAS (todos los ejes) EN ESTADO DIFUMINADO.
        // Se ejecuta una única vez al cargar la página, para que el mapa muestre
        // siempre la red ciclista completa e interconectada, sin importar qué eje
        // esté seleccionado en el submenú.
        async function precargarTodaLaRed() {
            const todosLosIds = Object.keys(rutasManifest);
            // Carga en serie: los ficheros de ruta comparten la misma variable
            // global window.rutaActivaDatos, así que hay que procesarlos uno a uno.
            for (const idRuta of todosLosIds) {
                try {
                    await cargarDatosRuta(idRuta);
                    // Si esa ruta ya fue seleccionada mientras cargábamos el resto
                    // (por ejemplo, el usuario hizo clic muy rápido en el carrusel),
                    // no la pisamos con su versión difuminada.
                    if (idRutaSeleccionada !== idRuta) {
                        renderizarCapaRuta(idRuta, false);
                    }
                } catch (err) {
                    console.error(err.message);
                }
            }
        }

        // 2. FILTRADO DEL SUBMENÚ/CARRUSEL SEGÚN EL EJE ELEGIDO.
        // Ojo: esto NO toca el mapa ni recarga nada; el mapa siempre muestra la
        // red completa. Solo cambia qué botones aparecen en el carrusel superior.
        function filtrarEje(ejeId) {
            // Activar botón visual correspondiente
            document.querySelectorAll('.eje-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-eje') === ejeId);
            });

            ejeActual = ejeId;

            const carrusel = document.getElementById('rutas-carrusel');
            carrusel.innerHTML = '';
            carrusel.style.display = 'flex'; // Forzar contenedor visible

            // Salvaguarda
            if (typeof rutasManifest === 'undefined') {
                carrusel.style.display = 'none';
                return;
            }

            // Recorrer las claves reales del manifiesto
            const idsDelEje = Object.keys(rutasManifest).filter(idRuta =>
                String(rutasManifest[idRuta].eje).trim().toLowerCase() === String(ejeId).trim().toLowerCase()
            );

            // Ocultar el carrusel si para ese eje no se configuran rutas en el manifiesto
            if (idsDelEje.length === 0) {
                carrusel.style.display = 'none';
                return;
            }

            idsDelEje.forEach(idRuta => {
                const infoSimplificada = rutasManifest[idRuta];
                const item = document.createElement('div');
                item.className = 'carrusel-item';
                item.setAttribute('data-id-ruta', idRuta);
                item.setAttribute('data-eje-grupo', ejeId);
                item.innerText = infoSimplificada.titulo;
                // Si la ruta ya está seleccionada (de un clic previo en el mapa o
                // en otro eje), refleja ese estado también en este submenú.
                if (idRuta === idRutaSeleccionada) {
                    item.classList.add('active');
                }
                item.onclick = () => seleccionarRuta(idRuta);
                carrusel.appendChild(item);
            });

            // PUNTO 4: recalcular la pista de scroll horizontal al cambiar de eje
            requestAnimationFrame(actualizarPistaScrollCarrusel);
        }

        // 2. CARGA (Y CACHÉ) DE LOS DATOS DE UNA RUTA MEDIANTE INYECCIÓN DE SCRIPT
        function cargarDatosRuta(idRuta) {
            return new Promise((resolve, reject) => {
                // Si ya se descargó antes (p.ej. al cambiar de eje y volver), no repetir petición de red
                if (rutasCache[idRuta]) {
                    resolve(rutasCache[idRuta]);
                    return;
                }
                const script = document.createElement('script');
                script.src = `datos/rutas/${idRuta}.js`;

                script.onload = () => {
                    // Comprobación de integridad de los datos cargados en la variable global window
                    if (window.rutaActivaDatos && window.rutaActivaDatos.id === idRuta) {
                        rutasCache[idRuta] = window.rutaActivaDatos;
                        // Limpiamos la variable global para que no quede "contaminada"
                        // de cara a la siguiente ruta que se cargue en la cola.
                        window.rutaActivaDatos = undefined;
                        script.remove();
                        resolve(rutasCache[idRuta]);
                    } else {
                        script.remove();
                        reject(new Error(`Error de carga: Los datos cargados en 'window.rutaActivaDatos' no coinciden con la ID solicitada ('${idRuta}').`));
                    }
                };
                script.onerror = () => {
                    script.remove();
                    reject(new Error(`Error de red: No se pudo localizar el archivo 'datos/rutas/${idRuta}.js'.`));
                };
                document.body.appendChild(script);
            });
        }

        // 3. SELECCIÓN DE UNA RUTA (desde el carrusel o con click directo sobre el trazado en el mapa)
        async function seleccionarRuta(idRuta) {
            // Marcar visualmente el submenú activo
            document.querySelectorAll('.carrusel-item').forEach(item => {
                item.classList.toggle('active', item.getAttribute('data-id-ruta') === idRuta);
            });

            const idPrevio = idRutaSeleccionada;
            idRutaSeleccionada = idRuta;

            try {
                const datos = await cargarDatosRuta(idRuta);

                // Devolver la ruta anterior (si había una distinta) a su estado difuminado
                if (idPrevio && idPrevio !== idRuta && rutasCache[idPrevio]) {
                    renderizarCapaRuta(idPrevio, false);
                }

                // Redibujar la ruta seleccionada a color pleno, mostrando ya sus avisos
                renderizarCapaRuta(idRuta, true);

                mostrarInfoRuta(datos);
            } catch (err) {
                console.error(err.message);
            }
        }

        // 4. DIBUJADO DE LA GEOMETRÍA DE UNA RUTA (difuminada o seleccionada)
        function renderizarCapaRuta(idRuta, seleccionada) {
            const datos = rutasCache[idRuta];
            if (!datos) return;

            // Si ya existía una instancia dibujada de esta ruta, se retira para
            // sustituirla por la nueva (con el estilo/avisos que corresponda).
            if (capasRutas[idRuta]) {
                capasPreview.removeLayer(capasRutas[idRuta]);
            }

            const colorTrazado = coloresEjes[datos.eje] || '#3498db';
            const estiloLinea = seleccionada
                ? { color: colorTrazado, weight: 6, opacity: 0.90 }
                : { color: colorTrazado, weight: 4, opacity: 0.30 };

            const capa = L.geoJSON(datos.geojson, {
                // Los avisos (properties.tipo === 'advertencia') solo se muestran
                // cuando la ruta está seleccionada; el resto de puntos/icono siguen
                // visibles siempre, igual que en el comportamiento original.
                filter: function(feature) {
                    const props = feature.properties || {};
                    if (props.tipo === 'advertencia') {
                        return seleccionada;
                    }
                    return true;
                },
                style: function() {
                    return estiloLinea;
                },
                // PUNTO 1: respeta cualquier icono definido en las properties del GeoJSON.
                pointToLayer: function(feature, latlng) {
                    const props = feature.properties || {};
                    if (props.tipo === 'advertencia') {
                        return L.circleMarker(latlng, {
                            radius: 9,
                            fillColor: '#e74c3c',
                            color: '#ffffff',
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).bindPopup(`<strong>⚠️ ¡Atención!</strong><br>${props.descripcion}`);
                    }
                    if (props.icono) {
                        const iconoPersonalizado = L.divIcon({
                            className: 'marcador-punto-icono',
                            html: `<div class="marcador-punto-icono-interior">${props.icono}</div>`,
                            iconSize: [34, 34],
                            iconAnchor: [17, 17],
                            popupAnchor: [0, -17]
                        });
                        const marker = L.marker(latlng, { icon: iconoPersonalizado, opacity: seleccionada ? 1 : 0.45 });
                        if (props.titulo || props.descripcion) {
                            marker.bindPopup(`${props.titulo ? `<strong>${props.titulo}</strong><br>` : ''}${props.descripcion || ''}`);
                        }
                        return marker;
                    }
                    return L.marker(latlng, { opacity: seleccionada ? 1 : 0.45 });
                },
                onEachFeature: function(feature, layer) {
                    // Permite seleccionar la ruta haciendo click directamente sobre
                    // su trazado en el mapa, igual que si se pulsara en el carrusel.
                    const tipoGeometria = feature.geometry && feature.geometry.type;
                    if (tipoGeometria === 'LineString' || tipoGeometria === 'MultiLineString') {
                        layer.on('click', () => seleccionarRuta(idRuta));
                        layer.on('mouseover', function () {
                            if (!document.body.classList.contains('arrastrando')) {
                                this.getElement() && (this.getElement().style.cursor = 'pointer');
                            }
                        });
                    }
                }
            });

            capasRutas[idRuta] = capa;
            capasPreview.addLayer(capa);
        }

        // 5. RENDERIZADO DE LA TARJETA DE INFORMACIÓN EN LA SIDEBAR
        function mostrarInfoRuta(datos) {
            const contenedor = document.getElementById('contenedor-tarjetas');
            contenedor.innerHTML = ''; // Limpiar tarjeta anterior
            let claseDificultad = 'facil';
            let textoDificultad = 'Fácil';
            if (datos.dificultad === 'moderado') {
                claseDificultad = 'moderado';
                textoDificultad = 'Moderado';
            } else if (datos.dificultad === 'dificil') {
                claseDificultad = 'dificil';
                textoDificultad = 'Difícil';
            }
            const HTMLetiquetas = datos.etiquetas ? datos.etiquetas.map(t => `<span>#${t}</span>`).join('\n') : '';
            const HTMLconsejos = datos.consejos ? datos.consejos.map(c => `
                ${c.icono || '👉'} <strong>${c.titulo}:</strong> ${c.texto}.<br>
            `).join('\n') : '';
            // Generar la tarjeta detallada
            const card = document.createElement('div');
            card.className = 'ruta-card';
            card.setAttribute('data-eje', datos.eje);
            card.innerHTML = `
                <div class="ruta-title" onclick="toggleMinimizar()">${datos.titulo}</div>
                <div class="ruta-subtitle">${datos.subtitulo}</div>
                <div class="ruta-meta">
                    <span class="tag-dificultad ${claseDificultad}">${textoDificultad}</span>
                    <span>📏 ${datos.distancia}</span>
                    <span>⏱️ ${datos.tiempo}</span>
                    <span>⬆️ ${datos.desnivel}</span>
                </div>
                <div class="ruta-meta">
                    ${HTMLetiquetas}
                </div>
                <p class="descripcion-ruta">${datos.descripcion}</p>
                <div class="indicaciones">
                    <strong>💡 Biciconsejos</strong><br><br>
                    ${HTMLconsejos}
                </div>
            `;
            contenedor.appendChild(card);
            // Transiciones CSS para la barra lateral / Bottom Sheet móvil
            const sidebar = document.getElementById('rutas-sidebar');
            if (esDispositivoMovil()) {
                sidebar.classList.remove('expanded', 'minimized');
                sidebar.classList.add('visible');
                sidebar.style.transform = 'translateY(55%)'; 
            } else {
                sidebar.classList.remove('minimized', 'expanded');
                sidebar.classList.add('visible');
                sidebar.style.transform = ''; 
            }
            // El mapa ya NO se desplaza automáticamente al seleccionar una ruta:
            // se respeta la posición/zoom que el usuario tenga en cada momento.
        }
        // 6. CONTROL DE INTERFAZ (SIDEBAR)
        function cerrarSidebar() {
            const sidebar = document.getElementById('rutas-sidebar');
            sidebar.classList.remove('visible', 'expanded', 'minimized');
            if (esDispositivoMovil()) {
                sidebar.style.transform = 'translateY(100%)';
            } else {
                sidebar.style.transform = 'translateX(120%)';
            }
        }
        function toggleMinimizar() {
            const sidebar = document.getElementById('rutas-sidebar');
            if (sidebar.classList.contains('minimized')) {
                sidebar.classList.remove('minimized');
                if (esDispositivoMovil()) {
                    sidebar.classList.remove('expanded');
                    sidebar.style.transform = 'translateY(55%)';
                } else {
                    sidebar.style.transform = '';
                }
            } else {
                sidebar.classList.add('minimized');
                sidebar.classList.remove('expanded');
                if (esDispositivoMovil()) {
                    sidebar.style.transform = 'translateY(calc(100% - 75px))'; 
                }
            }
        }
        // 7. GESTIÓN TÁCTIL (MOVIMIENTOS DE DESLIZAMIENTO MÓVIL)
        const sidebar = document.getElementById('rutas-sidebar');
        let startY = 0, currentY = 0, isDragging = false;
        let modoArrastre = null; // 'panel' (mover todo el panel) | null (aún sin decidir)
        function esDispositivoMovil() { return window.innerWidth <= 768; }
        // Se puede iniciar el arrastre agarrando la cabecera (handle + botón cerrar),
        // igual que antes. Pero si el toque empieza dentro del contenido con el panel
        // ya expandido, NO decidimos todavía: esperamos al primer touchmove para ver
        // si el usuario quiere hacer scroll (lo dejamos pasar) o tirar hacia abajo
        // estando ya arriba del todo (eso sí colapsa el panel).
        sidebar.addEventListener('touchstart', (e) => {
            if (!esDispositivoMovil()) return;
            const enCabecera = e.target.id === 'drag-handle' || !!e.target.closest('.sidebar-header');
            startY = e.touches[0].clientY;
            currentY = startY;
            if (enCabecera || !sidebar.classList.contains('expanded')) {
                isDragging = true;
                modoArrastre = 'panel';
                sidebar.style.transition = 'none';
            } else {
                isDragging = false;
                modoArrastre = null;
            }
        });
        sidebar.addEventListener('touchmove', (e) => {
            if (!esDispositivoMovil()) return;
            currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;
            if (modoArrastre === null) {
                const contenedorTarjetas = document.getElementById('contenedor-tarjetas');
                // Solo se convierte en "cerrar panel" si tira hacia abajo estando
                // ya al principio del contenido. En cualquier otro caso, dejamos
                // que el scroll nativo del contenido siga funcionando.
                if (deltaY > 0 && contenedorTarjetas.scrollTop <= 0) {
                    isDragging = true;
                    modoArrastre = 'panel';
                    sidebar.style.transition = 'none';
                } else {
                    return;
                }
            }
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault();
            if (sidebar.classList.contains('expanded')) {
                sidebar.style.transform = `translateY(${Math.max(0, deltaY)}px)`;
            } else if (sidebar.classList.contains('minimized')) {
                sidebar.style.transform = `translateY(calc(100% - 75px + ${deltaY}px))`;
            } else {
                sidebar.style.transform = `translateY(calc(55% + ${deltaY}px))`;
            }
        }, { passive: false });
        sidebar.addEventListener('touchend', () => {
            modoArrastre = null;
            if (!isDragging) return;
            isDragging = false;
            sidebar.style.transition = 'transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94)';
            
            const deltaY = currentY - startY;
            if (Math.abs(deltaY) > 70) {
                if (deltaY < 0) {
                    if (sidebar.classList.contains('minimized')) {
                        sidebar.classList.remove('minimized');
                        sidebar.style.transform = 'translateY(55%)';
                    } else {
                        sidebar.classList.add('expanded');
                        sidebar.style.transform = 'translateY(0%)';
                    }
                } else {
                    if (sidebar.classList.contains('expanded')) {
                        sidebar.classList.remove('expanded');
                        sidebar.style.transform = 'translateY(55%)';
                    } else {
                        sidebar.classList.add('minimized');
                        sidebar.style.transform = 'translateY(calc(100% - 75px))';
                    }
                }
            } else {
                if (sidebar.classList.contains('expanded')) {
                    sidebar.style.transform = 'translateY(0%)';
                } else if (sidebar.classList.contains('minimized')) {
                    sidebar.style.transform = 'translateY(calc(100% - 75px))';
                } else {
                    sidebar.style.transform = 'translateY(55%)';
                }
            }
        });
        // PUNTO 4: pista visual de scroll horizontal en el selector de Ejes (móvil).
        // Muestra un degradado a la derecha mientras haya más ejes por descubrir,
        // y lo oculta automáticamente al llegar al final del scroll.
        const selectorEjes = document.getElementById('selector-ejes');
        function actualizarPistaScrollCarrusel() {
            const alFinal = selectorEjes.scrollLeft + selectorEjes.clientWidth >= selectorEjes.scrollWidth - 5;
            selectorEjes.classList.toggle('scroll-fin', alFinal);
        }
        selectorEjes.addEventListener('scroll', actualizarPistaScrollCarrusel);
        window.addEventListener('resize', actualizarPistaScrollCarrusel);
        window.addEventListener('load', actualizarPistaScrollCarrusel);
        // Si la navbar cambia de alto (p.ej. hace wrap en pantallas muy estrechas),
        // el mapa debe recalcular su tamaño o Leaflet se queda con medidas viejas.
        window.addEventListener('resize', () => map.invalidateSize());
    </script>
</body>
