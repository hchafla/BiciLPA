<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infraestructura Ciclista - Rutas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-light: #f8f9fa;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e2e8f0;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-light);
        }

        /* Contenedor Principal */
        .map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #map-rutas {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* HEADER / SELECTOR DE EJES (Flotante) */
        .selector-ejes {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 90%;
            overflow-x: auto;
            scrollbar-width: none; /* Firefox */
        }

        .selector-ejes::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .eje-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dark);
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }

        .eje-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .eje-btn.active {
            color: #fff;
        }

        /* Estilos específicos de botones según el eje activo */
        .eje-btn[data-eje="central"].active { background-color: #0074D9; }
        .eje-btn[data-eje="norte"].active { background-color: #2ECC40; }
        .eje-btn[data-eje="baja-alta"].active { background-color: #FF851B; }
        .eje-btn[data-eje="alta-baja"].active { background-color: #B10DC9; }

        /* CARRUSEL HORIZONTAL DE RUTAS (SUBMENÚ) */
        .rutas-carrusel {
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: none; /* Se activa mediante JS */
            gap: 10px;
            max-width: 90%;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: none;
        }

        .rutas-carrusel::-webkit-scrollbar {
            display: none;
        }

        .carrusel-item {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: var(--shadow);
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .carrusel-item:hover {
            transform: translateY(-2px);
        }

        /* Color dinámico del ítem del carrusel activo según el eje */
        .carrusel-item.active[data-eje-grupo="central"] { background: #0074D9; color: white; border-color: #0074D9; }
        .carrusel-item.active[data-eje-grupo="norte"] { background: #2ECC40; color: white; border-color: #2ECC40; }
        .carrusel-item.active[data-eje-grupo="baja-alta"] { background: #FF851B; color: white; border-color: #FF851B; }
        .carrusel-item.active[data-eje-grupo="alta-baja"] { background: #B10DC9; color: white; border-color: #B10DC9; }

        /* BARRA LATERAL (SIDEBAR / BOTTOM SHEET) */
        .rutas-sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 380px;
            max-height: calc(100vh - 40px);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: var(--shadow);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateX(120%); /* Oculto por defecto */
            transition: transform 0.4s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            border: 1px solid var(--border-color);
        }

        .rutas-sidebar.visible {
            transform: translateX(0);
        }

        /* Handle para arrastre en móvil */
        .drag-handle {
            display: none;
            width: 40px;
            height: 5px;
            background: #cbd5e1;
            border-radius: 3px;
            margin: 10px auto 5px auto;
            cursor: grab;
        }

        .sidebar-header {
            padding: 15px 20px 10px 20px;
            display: flex;
            justify-content: flex-end;
            border-bottom: 1px solid var(--border-color);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            transition: var(--transition);
        }

        .close-btn:hover {
            color: var(--text-dark);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Tarjeta de Información */
        .ruta-card {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .ruta-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.2;
            cursor: pointer;
        }

        .ruta-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: -5px;
        }

        .ruta-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .ruta-meta span {
            background: var(--bg-light);
            padding: 6px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tag-dificultad {
            color: white !important;
        }

        .tag-dificultad.facil { background-color: #2ecc71 !important; }
        .tag-dificultad.moderado { background-color: #f39c12 !important; }
        .tag-dificultad.dificil { background-color: #e74c3c !important; }

        .descripcion-ruta {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #4a5568;
        }

        .indicaciones {
            background: #f7fafc;
            border-left: 4px solid var(--accent-color);
            padding: 15px;
            border-radius: 0 12px 12px 0;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #4a5568;
        }

        /* Asignación dinámica del borde de indicaciones según el eje */
        .ruta-card[data-eje="central"] .indicaciones { border-left-color: #0074D9; }
        .ruta-card[data-eje="norte"] .indicaciones { border-left-color: #2ECC40; }
        .ruta-card[data-eje="baja-alta"] .indicaciones { border-left-color: #FF851B; }
        .ruta-card[data-eje="alta-baja"] .indicaciones { border-left-color: #B10DC9; }

        /* RESPONSIVE (Móvil / Bottom Sheet) */
        @media (max-width: 768px) {
            .selector-ejes {
                top: 10px;
                padding: 6px;
            }

            .eje-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }

            .rutas-carrusel {
                top: 70px;
            }

            .rutas-sidebar {
                top: auto;
                right: 0;
                bottom: 0;
                width: 100%;
                height: 85%;
                max-height: 85vh;
                border-radius: 24px 24px 0 0;
                transform: translateY(100%); /* Oculto abajo */
                box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.15);
                border: none;
                border-top: 1px solid var(--border-color);
            }

            .rutas-sidebar.visible {
                transform: translateY(55%); /* Se eleva inicialmente a la mitad */
            }

            .rutas-sidebar.expanded {
                transform: translateY(0%) !important;
            }

            .rutas-sidebar.minimized {
                transform: translateY(calc(100% - 75px)) !important;
            }

            .drag-handle {
                display: block;
            }

            .sidebar-header {
                padding: 5px 20px;
                justify-content: space-between;
                align-items: center;
                border-bottom: none;
            }

            .sidebar-content {
                padding: 10px 20px 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="map-container">
        <!-- Selector Principal de Ejes -->
        <div class="selector-ejes">
            <button class="eje-btn" data-eje="central" onclick="filtrarEje('central')">Eje Central</button>
            <button class="eje-btn" data-eje="norte" onclick="filtrarEje('norte')">Eje Norte</button>
            <button class="eje-btn" data-eje="baja-alta" onclick="filtrarEje('baja-alta')">Conexión Baja-Alta</button>
            <button class="eje-btn" data-eje="alta-baja" onclick="filtrarEje('alta-baja')">Conexión Alta-Baja</button>
        </div>

        <!-- Submenú Horizontal de Rutas dependiente del Eje -->
        <div class="rutas-carrusel" id="rutas-carrusel"></div>

        <!-- El Mapa -->
        <div id="map-rutas"></div>

        <!-- Barra Lateral Dinámica -->
        <div class="rutas-sidebar" id="rutas-sidebar">
            <div class="drag-handle" id="drag-handle"></div>
            <div class="sidebar-header">
                <button class="close-btn" onclick="cerrarSidebar()">✕</button>
            </div>
            <div class="sidebar-content" id="contenedor-tarjetas">
                <!-- Se inyecta dinámicamente con JS -->
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Manifiesto Global (Cargado primero) -->
    <script src="datos/manifest.js"></script>

    <!-- Script Principal de Control -->
    <script>
        // =========================================================================
        // INICIALIZACIÓN Y EVENTOS
        // =========================================================================

        // Inicialización del Mapa
        const map = L.map('map-rutas').setView([28.128, -15.432], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let rutaActivaLayer = L.layerGroup().addTo(map);

        const coloresEjes = {
            'central': '#0074D9',   
            'norte': '#2ECC40',     
            'baja-alta': '#FF851B', 
            'alta-baja': '#B10DC9'  
        };

        // Asegurar la carga inicial una vez que el DOM y manifest.js estén listos
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof rutasManifest !== 'undefined') {
                filtrarEje('central'); // Carga el eje central por defecto
            } else {
                console.error("Error crítico: No se ha podido cargar 'rutasManifest' desde datos/manifest.js. Comprueba la ruta del archivo.");
            }
        });

        // 1. FILTRADO DESDE EL MANIFIESTO
        function filtrarEje(ejeId) {
            document.querySelectorAll('.eje-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-eje') === ejeId);
            });

            // Limpieza y reset de vistas
            rutaActivaLayer.clearLayers();
            cerrarSidebar();

            const carrusel = document.getElementById('rutas-carrusel');
            carrusel.innerHTML = ''; 
            carrusel.style.display = 'flex'; 

            // Verificar si el manifiesto existe antes de iterar
            if (typeof rutasManifest === 'undefined') {
                console.error("El objeto rutasManifest no está definido.");
                return;
            }

            // Leer del objeto global 'rutasManifest' cargado desde datos/manifest.js
            let rutasEncontradas = false;
            Object.keys(rutasManifest).forEach(idRuta => {
                const infoSimplificada = rutasManifest[idRuta];
                if (infoSimplificada.eje === ejeId) {
                    rutasEncontradas = true;
                    const item = document.createElement('div');
                    item.className = 'carrusel-item';
                    item.setAttribute('data-id-ruta', idRuta);
                    item.setAttribute('data-eje-grupo', ejeId);
                    item.innerText = infoSimplificada.titulo;
                    item.onclick = () => seleccionarRuta(idRuta);
                    carrusel.appendChild(item);
                }
            });

            if (!rutasEncontradas) {
                carrusel.style.display = 'none';
            }

            map.setView([28.128, -15.432], 13);
        }

        // 2. CARGA DINÁMICA BAJO DEMANDA (desde datos/rutas/)
        function seleccionarRuta(idRuta) {
            document.querySelectorAll('.carrusel-item').forEach(item => {
                item.classList.toggle('active', item.getAttribute('data-id-ruta') === idRuta);
            });

            // Destruir script previo si existía para evitar colisiones de memoria
            const scriptPrevio = document.getElementById('script-ruta-activa');
            if (scriptPrevio) {
                scriptPrevio.remove();
            }

            // Inyectar dinámicamente el script de la ruta seleccionada apuntando a la carpeta de datos/rutas
            const script = document.createElement('script');
            script.id = 'script-ruta-activa';
            script.src = `datos/rutas/${idRuta}.js`;
            
            script.onload = () => {
                // Recuperar el objeto inyectado en el espacio global por el script de la ruta
                if (window.rutaActivaDatos && window.rutaActivaDatos.id === idRuta) {
                    renderizarDatosYMapa(window.rutaActivaDatos);
                } else {
                    console.error("Error: Los datos de la ruta no se cargaron correctamente en window.rutaActivaDatos.");
                }
            };

            script.onerror = () => {
                console.error(`No se pudo cargar el archivo: datos/rutas/${idRuta}.js`);
            };

            document.body.appendChild(script);
        }

        // 3. RENDERIZADO DE LA TARJETA Y EL TRAZADO EN EL MAPA
        function renderizarDatosYMapa(datos) {
            const contenedor = document.getElementById('contenedor-tarjetas');
            contenedor.innerHTML = ''; // Limpiar tarjeta anterior

            let claseDificultad = 'facil';
            let textoDificultad = 'Fácil';
            if (datos.dificultad === 'moderado') {
                claseDificultad = 'moderado';
                textoDificultad = 'Moderado';
            } else if (datos.dificultad === 'dificil') {
                claseDificultad = 'dificil';
                textoDificultad = 'Difícil';
            }

            const HTMLetiquetas = datos.etiquetas ? datos.etiquetas.map(t => `<span>#${t}</span>`).join('\n') : '';
            const HTMLconsejos = datos.consejos ? datos.consejos.map(c => `
                ${c.icono || '👉'} <strong>${c.titulo}:</strong> ${c.texto}.<br>
            `).join('\n') : '';

            // Generar la tarjeta dinámica dentro de la barra lateral
            const card = document.createElement('div');
            card.className = 'ruta-card';
            card.setAttribute('data-eje', datos.eje);
            card.innerHTML = `
                <div class="ruta-title" onclick="toggleMinimizar()">${datos.titulo}</div>
                <div class="ruta-subtitle">${datos.subtitulo}</div>
                <div class="ruta-meta">
                    <span class="tag-dificultad ${claseDificultad}">${textoDificultad}</span>
                    <span>📏 ${datos.distancia}</span>
                    <span>⏱️ ${datos.tiempo}</span>
                    <span>⬆️ ${datos.desnivel}</span>
                </div>
                <div class="ruta-meta">
                    ${HTMLetiquetas}
                </div>
                <p class="descripcion-ruta">${datos.descripcion}</p>
                <div class="indicaciones">
                    <strong>💡 Biciconsejos</strong><br><br>
                    ${HTMLconsejos}
                </div>
            `;
            contenedor.appendChild(card);

            // Mostrar barra lateral
            const sidebar = document.getElementById('rutas-sidebar');
            if (esDispositivoMovil()) {
                sidebar.classList.remove('expanded', 'minimized');
                sidebar.classList.add('visible');
                sidebar.style.transform = 'translateY(55%)'; // Estado colapsado móvil
            } else {
                sidebar.classList.remove('minimized', 'expanded');
                sidebar.classList.add('visible');
                sidebar.style.transform = ''; 
            }

            // Pintar trazado GeoJSON en el mapa
            rutaActivaLayer.clearLayers();
            const colorTrazado = coloresEjes[datos.eje] || '#3498db';

            const capaGeoJSON = L.geoJSON(datos.geojson, {
                style: function() {
                    return { color: colorTrazado, weight: 6, opacity: 0.90 };
                },
                pointToLayer: function(feature, latlng) {
                    if (feature.properties && feature.properties.tipo === 'advertencia') {
                        return L.circleMarker(latlng, {
                            radius: 9,
                            fillColor: '#e74c3c',
                            color: '#ffffff',
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).bindPopup(`<strong>⚠️ ¡Atención!</strong><br>${feature.properties.descripcion}`);
                    }
                    return L.marker(latlng);
                }
            }).addTo(rutaActivaLayer);

            if (capaGeoJSON.getBounds().isValid()) {
                map.fitBounds(capaGeoJSON.getBounds(), { padding: [40, 40], maxZoom: 15 });
            }
        }

        // 4. FUNCIONES AUXILIARES DE INTERFAZ
        function cerrarSidebar() {
            const sidebar = document.getElementById('rutas-sidebar');
            sidebar.classList.remove('visible', 'expanded', 'minimized');
            if (esDispositivoMovil()) {
                sidebar.style.transform = 'translateY(100%)';
            } else {
                sidebar.style.transform = 'translateX(120%)';
            }
        }

        function toggleMinimizar() {
            const sidebar = document.getElementById('rutas-sidebar');
            if (sidebar.classList.contains('minimized')) {
                sidebar.classList.remove('minimized');
                if (esDispositivoMovil()) {
                    sidebar.classList.remove('expanded');
                    sidebar.style.transform = 'translateY(55%)';
                } else {
                    sidebar.style.transform = '';
                }
            } else {
                sidebar.classList.add('minimized');
                sidebar.classList.remove('expanded');
                if (esDispositivoMovil()) {
                    sidebar.style.transform = 'translateY(calc(100% - 75px))'; 
                }
            }
        }

        // 5. GESTIÓN TÁCTIL MÓVIL (BOTTOM SHEET)
        const sidebar = document.getElementById('rutas-sidebar');
        let startY = 0, currentY = 0, isDragging = false;

        function esDispositivoMovil() { return window.innerWidth <= 768; }

        sidebar.addEventListener('touchstart', (e) => {
            if (!esDispositivoMovil()) return;
            const contenedorTarjetas = document.getElementById('contenedor-tarjetas');
            
            if (e.target.id === 'drag-handle' || contenedorTarjetas.scrollTop <= 0) {
                startY = e.touches[0].clientY;
                isDragging = true;
                sidebar.style.transition = 'none'; 
            }
        });

        sidebar.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;

            if (e.cancelable) e.preventDefault();

            if (sidebar.classList.contains('expanded')) {
                sidebar.style.transform = `translateY(${Math.max(0, deltaY)}px)`;
            } else if (sidebar.classList.contains('minimized')) {
                sidebar.style.transform = `translateY(calc(100% - 75px + ${deltaY}px))`;
            } else {
                sidebar.style.transform = `translateY(calc(55% + ${deltaY}px))`;
            }
        }, { passive: false });

        sidebar.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            sidebar.style.transition = 'transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94)';
            
            const deltaY = currentY - startY;

            if (Math.abs(deltaY) > 70) {
                if (deltaY < 0) {
                    if (sidebar.classList.contains('minimized')) {
                        sidebar.classList.remove('minimized');
                        sidebar.style.transform = 'translateY(55%)';
                    } else {
                        sidebar.classList.add('expanded');
                        sidebar.style.transform = 'translateY(0%)';
                    }
                } else {
                    if (sidebar.classList.contains('expanded')) {
                        sidebar.classList.remove('expanded');
                        sidebar.style.transform = 'translateY(55%)';
                    } else {
                        sidebar.classList.add('minimized');
                        sidebar.style.transform = 'translateY(calc(100% - 75px))';
                    }
                }
            } else {
                if (sidebar.classList.contains('expanded')) {
                    sidebar.style.transform = 'translateY(0%)';
                } else if (sidebar.classList.contains('minimized')) {
                    sidebar.style.transform = 'translateY(calc(100% - 75px))';
                } else {
                    sidebar.style.transform = 'translateY(55%)';
                }
            }
        });
    </script>
</body>
</html>
