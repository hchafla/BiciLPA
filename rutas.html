<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Rutas</title>
    
    <!-- Librería para el Mapa (Leaflet CSS) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        /* Estilos básicos de maquetación para asegurar un diseño funcional y adaptable */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: #333;
        }
        #sidebar {
            width: 350px;
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        #sidebar-header {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #dee2e6;
        }
        #sidebar-header h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        #lista-rutas {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .ruta-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .ruta-card:hover {
            border-color: #adb5bd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .ruta-card.activa {
            border-color: #007bff;
            background-color: #f1f7ff;
        }
        .ruta-card h3 {
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: #007bff;
        }
        .ruta-card p {
            font-size: 0.9rem;
            color: #6c757d;
            line-height: 1.4;
        }
        .ruta-meta {
            margin-top: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex;
            gap: 10px;
        }
        #map {
            flex-grow: 1;
            height: 100%;
        }
        @media (max-width: 768px) {
            body {
                flex-direction: column-reverse;
            }
            #sidebar {
                width: 100%;
                height: 40%;
            }
            #map {
                height: 60%;
            }
        }
    </style>
</head>
<body>

    <!-- Panel Lateral: Se rellena de manera 100% dinámica mediante JS -->
    <div id="sidebar">
        <div id="sidebar-header">
            <h1>Mis Rutas</h1>
            <p style="font-size: 0.85rem; color: #6c757d;">Selecciona una ruta para visualizar su trazado en el mapa.</p>
        </div>
        <div id="lista-rutas">
            <!-- Las tarjetas de las rutas se insertarán aquí automáticamente -->
        </div>
    </div>

    <!-- Contenedor del Mapa -->
    <div id="map"></div>

    <!-- Leaflet JS (Librería de mapas) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- CARGA DE DATOS EXTERNOS: Aquí es donde añades tus nuevas rutas -->
    <script src="rutas-info.js"></script>
    <script src="rutas-trazados.js"></script>

    <!-- LÓGICA DE CONTROL (Orquestador Dinámico) -->
    <script>
        // Verificación de seguridad de carga de datos
        if (typeof rutasInfo === 'undefined' || typeof rutasTrazados === 'undefined') {
            console.error("Error: Asegúrate de que 'rutas-info.js' y 'rutas-trazados.js' están correctamente declarados y contienen las variables 'rutasInfo' y 'rutasTrazados'.");
        }

        // Inicialización del mapa de Leaflet
        // Coordenadas por defecto (se ajustarán automáticamente al cargar la ruta seleccionada)
        const map = L.map('map').setView([40.416775, -3.703790], 6); 

        // Capa de mapa base (OpenStreetMap estándar)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        let capaTrazadoActivo = null; // Almacena la línea de la ruta dibujada actualmente

        // Elemento contenedor del panel lateral
        const contenedorLista = document.getElementById('lista-rutas');

        // Función para renderizar la interfaz de forma dinámica según 'rutasInfo'
        function inicializarInterfaz() {
            contenedorLista.innerHTML = ''; // Limpiar contenedor

            rutasInfo.forEach(ruta => {
                // Crear el contenedor de la tarjeta de la ruta
                const card = document.createElement('div');
                card.classList.add('ruta-card');
                card.dataset.id = ruta.id;

                // Estructura interna de la tarjeta
                card.innerHTML = `
                    <h3>${ruta.nombre}</h3>
                    <p>${ruta.descripcion || ''}</p>
                    <div class="ruta-meta">
                        <span>Distancia: ${ruta.distancia || '--'} km</span>
                        <span>Dificultad: ${ruta.dificultad || '--'}</span>
                    </div>
                `;

                // Evento de clic para seleccionar y cargar la ruta en el mapa
                card.addEventListener('click', () => seleccionarRuta(ruta.id, card));
                
                contenedorLista.appendChild(card);
            });
        }

        // Función para cambiar de ruta activa y actualizar el mapa
        function seleccionarRuta(idRuta, elementoCard) {
            // 1. Gestionar estados visuales activos en el sidebar
            document.querySelectorAll('.ruta-card').forEach(c => c.classList.remove('activa'));
            elementoCard.classList.add('activa');

            // 2. Limpiar el trazado anterior si existe
            if (capaTrazadoActivo) {
                map.removeLayer(capaTrazadoActivo);
            }

            // 3. Obtener coordenadas del archivo rutas-trazados.js
            const coordenadas = rutasTrazados[idRuta];

            if (coordenadas && coordenadas.length > 0) {
                // Dibujar la polilínea en el mapa
                capaTrazadoActivo = L.polyline(coordenadas, {
                    color: '#007bff',
                    weight: 5,
                    opacity: 0.85
                }).addTo(map);

                // Ajustar el zoom automáticamente para encuadrar la ruta completa
                map.fitBounds(capaTrazadoActivo.getBounds(), { padding: [30, 30] });
            } else {
                console.warn(`No se encontraron coordenadas válidas para la ruta con ID: ${idRuta}`);
            }
        }

        // Ejecutar inicialización al cargar la página
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof rutasInfo !== 'undefined' && rutasInfo.length > 0) {
                inicializarInterfaz();
                // Selecciona por defecto la primera ruta disponible
                const primeraCard = contenedorLista.querySelector('.ruta-card');
                if (primeraCard) {
                    primeraCard.click();
                }
            }
        });
    </script>
</body>
</html>
